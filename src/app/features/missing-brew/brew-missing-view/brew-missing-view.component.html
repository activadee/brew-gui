
    <section class="mx-auto max-w-xl space-y-3">
      <app-diagnostic-panel
        title="Homebrew not detected"
        message="Install Homebrew, then relaunch Brewdeck. This app runs as a local UI wrapper around the brew binary."
        [copyText]="installCommand"
      />

      <z-card class="space-y-3 border-border/70 bg-card/95 shadow-sm">
        <z-badge zType="outline" zShape="pill">Install command</z-badge>
        <pre class="overflow-x-auto rounded-md border border-border bg-muted/40 p-2 text-xs mono">{{ installCommand }}</pre>
        <div class="flex items-center justify-between gap-3">
          <p class="text-xs text-muted-foreground">
            After install, run <span class="mono">brew --version</span> to verify.
          </p>
          <a z-button zType="outline" zSize="sm" href="https://brew.sh" target="_blank" rel="noreferrer">
            Open brew.sh
          </a>
        </div>
      </z-card>
    </section>
