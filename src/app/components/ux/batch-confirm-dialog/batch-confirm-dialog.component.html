
    @if (open()) {
      <div class="fixed inset-0 z-40 bg-black/35 backdrop-blur-sm" (click)="cancel.emit()"></div>
      <section class="fixed left-1/2 top-1/2 z-50 w-[520px] max-w-[92vw] -translate-x-1/2 -translate-y-1/2">
        <z-card class="border-border/70 bg-popover/95 shadow-2xl">
          <div class="space-y-3">
            <div>
              <h3 class="text-base font-semibold">{{ title() }}</h3>
              <p class="mt-1 text-sm text-muted-foreground">{{ message() }}</p>
            </div>

            @if (packageNames().length > 0) {
              <ul class="max-h-32 space-y-0.5 overflow-y-auto rounded-md border border-border bg-muted/30 p-2 text-sm">
                @for (name of packageNames(); track name) {
                  <li class="mono text-[11px]">{{ name }}</li>
                }
              </ul>
            }

            @if (commandPreview()) {
              <pre class="max-h-28 overflow-auto rounded-md border border-border bg-muted/40 p-2 text-[11px] mono whitespace-pre-wrap">{{ commandPreview() }}</pre>
            }

            <z-divider zSpacing="sm" />

            <div class="flex justify-end gap-2">
              <button type="button" z-button zType="outline" zSize="sm" [zDisabled]="busy()" (click)="cancel.emit()">
                Cancel
              </button>
              <button type="button" z-button zSize="sm" [zDisabled]="busy()" (click)="confirm.emit()">
                {{ busy() ? 'Running…' : confirmLabel() }}
              </button>
            </div>
          </div>
        </z-card>
      </section>
    }
